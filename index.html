<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MoradaUno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8F6F9; font-family: sans-serif; }
        .card-m { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(103, 30, 117, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = useState([]);
            const [activeMonth, setActiveMonth] = useState("");
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                // USAMOS UN PROXY PARA EVITAR EL BLOQUEO (CORS ANYWHERE)
                const originalUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                
                // Agregamos un timestamp para que no use datos viejos guardados en caché
                const finalUrl = originalUrl + "&cachebuster=" + new Date().getTime();

                Papa.parse(finalUrl, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        console.log("Columnas detectadas:", Object.keys(results.data[0]));
                        
                        const formatted = results.data
                            .filter(row => row.QMesEquipo)
                            .map(row => {
                                const parseN = (v) => v ? parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0 : 0;
                                return {
                                    mes: row.QMesEquipo,
                                    cantado: parseN(row.CantadoEquipo),
                                    meta: parseN(row["Meta RevenueEquipo"]),
                                    alcance: parseN(row["Alcance mesEquipo"]),
                                    monse: parseN(row["cantadoMonse"]),
                                    jess: parseN(row["cantadoJess"]),
                                    marla: parseN(row["cantadoMarla"])
                                };
                            });

                        if (formatted.length > 0) {
                            setData(formatted);
                            setActiveMonth(formatted[formatted.length - 1].mes);
                            setLoading(false);
                        } else {
                            setError("El archivo está vacío o las columnas no coinciden.");
                            setLoading(false);
                        }
                    },
                    error: () => {
                        setError("Google Sheets rechazó la conexión. Verifica que esté 'Publicado en la Web' como CSV.");
                        setLoading(false);
                    }
                });
            }, []);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center">
                    <div className="w-10 h-10 border-4 border-purple-200 border-t-purple-700 rounded-full animate-spin mb-4"></div>
                    <p className="text-purple-800 font-bold">ESTABLECIENDO CONEXIÓN SEGURA...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex flex-col items-center justify-center p-10 text-center">
                    <div className="bg-red-50 p-8 rounded-3xl border border-red-100">
                        <h2 className="text-red-600 font-black text-2xl mb-2">BLOQUEO DE DATOS</h2>
                        <p className="text-red-400 text-sm mb-6 max-w-sm">{error}</p>
                        <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-2 rounded-full font-bold">Reintentar</button>
                    </div>
                </div>
            );

            const current = data.find(d => d.mes === activeMonth) || data[0];

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-purple-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#671E75] text-white w-10 h-10 rounded-xl flex items-center justify-center font-black italic text-xl">M</div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">MoradaUno | <span className="text-teal-500">Renewal</span></h1>
                        </div>
                        <select 
                            value={activeMonth} 
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-purple-50 border-none font-bold px-6 py-3 rounded-2xl text-[#671E75] outline-none"
                        >
                            {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                        </select>
                    </header>

                    <div className={`p-10 rounded-[3rem] mb-10 transition-all duration-700 text-white shadow-xl ${current.alcance >= 100 ? 'bg-teal-500' : 'bg-[#671E75]'}`}>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] mb-2 opacity-70">Total Cantado Equipo</p>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <h2 className="text-7xl font-black tracking-tighter">${current.cantado?.toLocaleString()}</h2>
                            <div className="bg-black/10 px-8 py-6 rounded-[2.5rem] text-center min-w-[200px]">
                                <p className="text-xs font-bold opacity-70 mb-1">ALCANCE</p>
                                <p className="text-5xl font-black">{current.alcance}%</p>
                            </div>
                        </div>
                        <p className="mt-6 font-bold opacity-60">META DEL MES: ${current.meta?.toLocaleString()}</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 card-m p-8 h-80">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-8">Performance</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={data}>
                                    <XAxis dataKey="mes" hide />
                                    <Tooltip contentStyle={{borderRadius: '1rem', border: 'none'}} />
                                    <Bar dataKey="cantado" radius={[10, 10, 0, 0]}>
                                        {data.map((entry, index) => (
                                            <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#E2E8F0'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="card-m p-8 flex flex-col items-center">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 w-full text-left">Mix Comercial</h3>
                            <div className="h-48 w-full">
                                <ResponsiveContainer>
                                    <PieChart>
                                        <Pie 
                                            data={[
                                                { name: 'Monse', value: current.monse },
                                                { name: 'Jess', value: current.jess },
                                                { name: 'Marla', value: current.marla }
                                            ]} 
                                            dataKey="value" innerRadius={55} outerRadius={75} paddingAngle={8}
                                        >
                                            <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="flex justify-between w-full mt-4 text-[11px] font-black uppercase italic">
                                <span className="text-[#671E75]">Monse</span>
                                <span className="text-teal-500">Jess</span>
                                <span className="text-purple-400">Marla</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
