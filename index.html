<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MoradaUno | Renewal Sales</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F8FAFC; color: #1E1B4B; }
        .card-morada { background: white; border-radius: 2rem; border: 1px solid #F1F5F9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .text-morada { color: #671E75; }
        .bg-morada { background-color: #671E75; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, ReferenceLine, Label } = window.Recharts;

        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";

        const formatCurrency = (val) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }).format(val || 0);

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMonth, setSelectedMonth] = useState("");

            useEffect(() => {
                Papa.parse(GOOGLE_SHEET_URL, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const clean = results.data.filter(r => r.QMesEquipo).map(row => {
                            const n = (v) => parseFloat(v?.replace(/[^0-9.-]+/g, "") || 0);
                            return {
                                name: row.QMesEquipo,
                                acumulado: n(row.CantadoEquipo),
                                meta: n(row["Meta RevenueEquipo"]),
                                recuperado: n(row["Recuperado del MesEquipo"]),
                                monse: n(row["Monse cantado"]),
                                jess: n(row["Jess cantado"]),
                                marla: n(row["Marla cantado"]),
                                alcance: n(row["Alcance Equipo (Meta)"]) || 0
                            };
                        });
                        setData(clean);
                        if (clean.length > 0) setSelectedMonth(clean[clean.length - 1].name);
                        setLoading(false);
                    }
                });
            }, []);

            const current = useMemo(() => data.find(d => d.name === selectedMonth) || {}, [data, selectedMonth]);
            
            const qAnalysis = useMemo(() => {
                if (data.length === 0) return null;
                const sorted = [...data].sort((a, b) => b.acumulado - a.acumulado);
                const best = sorted[0];
                const avg = data.reduce((acc, curr) => acc + curr.acumulado, 0) / data.length;
                return {
                    bestName: best.name,
                    bestValue: best.acumulado,
                    ratio: (((best.acumulado / avg) - 1) * 100).toFixed(1)
                };
            }, [data]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-morada animate-pulse">CARGANDO DATOS...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    {/* NAV ESTILO ORIGINAL */}
                    <nav className="flex flex-wrap justify-between items-center mb-8 gap-4 bg-white p-6 rounded-[2rem] shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-morada rounded-xl flex items-center justify-center text-white font-bold italic text-xl">M</div>
                            <div>
                                <span className="font-black text-lg tracking-tight">MoradaUno</span>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Renewal Sales Dashboard</p>
                            </div>
                        </div>
                        <select 
                            value={selectedMonth} 
                            onChange={(e) => setSelectedMonth(e.target.value)}
                            className="bg-slate-50 border border-slate-200 font-black text-xs uppercase px-6 py-3 rounded-xl outline-none focus:ring-2 ring-purple-100"
                        >
                            {data.map(d => <option key={d.name} value={d.name}>{d.name} 2026</option>)}
                        </select>
                    </nav>

                    {/* ACUMULADO CARD (Original) */}
                    <div className={`p-8 rounded-[2.5rem] mb-8 flex flex-col md:flex-row justify-between items-center gap-6 ${current.alcance >= 100 ? 'bg-emerald-600 text-white shadow-xl shadow-emerald-100' : 'bg-white border border-slate-100 shadow-sm'}`}>
                        <div className="flex-1 text-center md:text-left">
                            <p className={`text-[11px] font-black uppercase tracking-[0.2em] mb-2 ${current.alcance >= 100 ? 'text-emerald-100' : 'text-slate-400'}`}>Acumulado Total Equipo</p>
                            <h2 className="text-5xl font-[900] tracking-tighter">{formatCurrency(current.acumulado)}</h2>
                            <p className="mt-2 text-sm font-bold opacity-80">Meta: {formatCurrency(current.meta)}</p>
                        </div>
                        <div className="flex flex-col items-center px-10 border-x border-slate-100/20">
                            <p className="text-[10px] font-black uppercase mb-1">Alcance</p>
                            <span className="text-4xl font-black">{current.alcance}%</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* GRÁFICO PRINCIPAL */}
                        <div className="lg:col-span-2 card-morada p-8">
                            <div className="flex justify-between items-start mb-8">
                                <h3 className="font-black text-slate-800 uppercase text-xs tracking-widest flex items-center gap-2">
                                    <i data-lucide="trending-up" className="text-morada"></i> Tendencia de Ingresos
                                </h3>
                                <div className="text-right">
                                    <p className="text-[10px] font-black text-slate-400">LOGRADO MES</p>
                                    <p className="text-xl font-black text-morada">{formatCurrency(current.acumulado)}</p>
                                </div>
                            </div>
                            <div className="h-80">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={data}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 11, fontWeight: 700, fill: '#94A3B8'}} />
                                        <YAxis hide domain={[0, 'dataMax + 500000']} />
                                        <Tooltip cursor={{fill: '#F8FAFC'}} contentStyle={{borderRadius: '1rem', border: 'none', boxShadow: '0 10px 15px rgba(0,0,0,0.05)'}} />
                                        <Bar dataKey="acumulado" radius={[10, 10, 0, 0]}>
                                            {data.map((entry, index) => (
                                                <Cell key={index} fill={entry.name === selectedMonth ? '#671E75' : '#E2E8F0'} />
                                            ))}
                                        </Bar>
                                        <ReferenceLine y={current.meta} stroke="#EF4444" strokeDasharray="5 5">
                                            <Label value="META" position="top" style={{fill: '#EF4444', fontSize: '10px', fontWeight: 900}} />
                                        </ReferenceLine>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* ANÁLISIS DE PEAK (Original) */}
                        <div className="flex flex-col gap-8">
                            <div className="bg-[#12051A] text-white p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                                <div className="relative z-10">
                                    <p className="text-purple-400 font-black text-[10px] uppercase tracking-widest mb-4">Análisis de Peak</p>
                                    <h4 className="text-4xl font-[900] mb-2">{formatCurrency(qAnalysis?.bestValue)}</h4>
                                    <p className="text-xs font-bold text-purple-300">MES RÉCORD: {qAnalysis?.bestName}</p>
                                    <div className="mt-8 pt-6 border-t border-white/10">
                                        <p className="text-xs leading-relaxed text-slate-300">
                                            Varianza de <span className="text-[#00C7B1] font-black">+{qAnalysis?.ratio}%</span> vs el promedio histórico de la ventana actual.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            {/* MIX POR ASESORA (Original) */}
                            <div className="card-morada p-8 h-full flex flex-col items-center">
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 w-full">Composición Comercial</p>
                                <div className="h-48 w-full">
                                    <ResponsiveContainer>
                                        <PieChart>
                                            <Pie 
                                                data={[
                                                    { name: 'Monse', value: current.monse },
                                                    { name: 'Jess', value: current.jess },
                                                    { name: 'Marla', value: current.marla }
                                                ]} 
                                                innerRadius={50} outerRadius={70} paddingAngle={8} dataKey="value"
                                            >
                                                <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                            </Pie>
                                            <Tooltip />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="w-full space-y-2 mt-4">
                                    <div className="flex justify-between text-[11px] font-bold"><span className="text-morada">Monse</span><span>{formatCurrency(current.monse)}</span></div>
                                    <div className="flex justify-between text-[11px] font-bold"><span className="text-[#00C7B1]">Jess</span><span>{formatCurrency(current.jess)}</span></div>
                                    <div className="flex justify-between text-[11px] font-bold"><span className="text-purple-400">Marla</span><span>{formatCurrency(current.marla)}</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
