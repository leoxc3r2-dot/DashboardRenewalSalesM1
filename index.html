<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoradaUno | Dashboard Comercial</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/file/dist/Recharts.js"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F8F6F9; }
        .card-premium { background: white; border-radius: 2rem; box-shadow: 0 10px 25px rgba(103, 30, 117, 0.05); border: 1px solid #F1F5F9; }
        .bg-morada { background-color: #671E75; }
        .text-morada { color: #671E75; }
        .shimmer { animation: shimmer 2.5s infinite linear; background: linear-gradient(90deg, #671E75 0%, #00C7B1 50%, #671E75 100%); background-size: 200% auto; }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = useState([]);
            const [activeMonth, setActiveMonth] = useState("");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                
                Papa.parse(url, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        // Filtrar y mapear con TUS nombres de columna exactos
                        const cleanData = results.data
                            .filter(row => row.QMesEquipo && row.QMesEquipo.trim() !== "")
                            .map(row => {
                                const n = (v) => parseFloat(v?.replace(/[^0-9.-]+/g, "") || 0);
                                return {
                                    mes: row.QMesEquipo,
                                    cantado: n(row.CantadoEquipo),
                                    meta: n(row["Meta RevenueEquipo"]),
                                    alcance: n(row["Alcance mesEquipo"]),
                                    recuperado: n(row["Recuperado del MesEquipo"]),
                                    // Datos individuales
                                    monse: n(row["Monse cantado"]),
                                    jess: n(row["Jess cantado"]),
                                    marla: n(row["Marla cantado"]),
                                    // Pisos
                                    piso60: n(row["Piso 60%Equipo"]),
                                    piso101: n(row["Monse Meta piso 101%"] + row["Jess Meta piso 101%"] + row["Marla Meta piso 101%"]) || n(row["Meta RevenueEquipo"]) * 1.01
                                };
                            });
                        setData(cleanData);
                        if (cleanData.length > 0) setActiveMonth(cleanData[cleanData.length - 1].mes);
                        setLoading(false);
                    }
                });
            }, []);

            const current = useMemo(() => data.find(d => d.mes === activeMonth) || {}, [data, activeMonth]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#F8F6F9]">
                    <div className="w-16 h-16 border-4 border-purple-100 border-t-purple-600 rounded-full animate-spin mb-4"></div>
                    <p className="text-morada font-black tracking-widest text-xs animate-pulse">SINCRONIZANDO COLUMNAS...</p>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* Header Institucional */}
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-morada text-white w-10 h-10 rounded-xl flex items-center justify-center font-black italic text-xl">M</div>
                            <h1 className="text-xl font-black text-slate-800 tracking-tight">MoradaUno <span className="text-[#00C7B1]">Commercial</span></h1>
                        </div>
                        <select 
                            value={activeMonth}
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-slate-50 border-none font-bold px-6 py-3 rounded-2xl text-morada ring-2 ring-purple-50 outline-none cursor-pointer hover:ring-purple-200 transition-all"
                        >
                            {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                        </select>
                    </header>

                    {/* KPI Principal con cambio de color al 100% */}
                    <div className={`p-10 rounded-[3rem] mb-10 transition-all duration-700 border-b-[12px] ${current.alcance >= 100 ? 'bg-[#00C7B1] text-white border-[#00A392] shadow-xl' : 'bg-white border-purple-100 card-premium shadow-sm'}`}>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                            <div>
                                <p className="text-[10px] font-black uppercase tracking-[0.3em] mb-2 opacity-80 uppercase">Total Cantado Equipo</p>
                                <h2 className="text-7xl font-black tracking-tighter">${current.cantado?.toLocaleString()}</h2>
                                <div className="flex gap-6 mt-4 text-sm font-bold opacity-75">
                                    <span>Meta: ${current.meta?.toLocaleString()}</span>
                                    <span>Recuperado: ${current.recuperado?.toLocaleString()}</span>
                                </div>
                            </div>
                            <div className="bg-black/5 p-10 rounded-[2.5rem] text-center min-w-[220px] backdrop-blur-sm">
                                <p className="text-[10px] font-black uppercase mb-1 opacity-70">Alcance Mes</p>
                                <p className="text-6xl font-black tracking-tighter">{current.alcance}%</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                        {/* Gráfica de Barras */}
                        <div className="lg:col-span-2 card-premium p-8 h-[400px]">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-10">Histórico de Ventas</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={data}>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                    <XAxis dataKey="mes" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 900}} />
                                    <YAxis hide />
                                    <Tooltip cursor={{fill: '#F8F6F9'}} contentStyle={{borderRadius: '1rem', border: 'none'}} />
                                    <Bar dataKey="cantado" radius={[12, 12, 0, 0]}>
                                        {data.map((entry, index) => (
                                            <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#E2E8F0'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Mix de Ventas (Individual) */}
                        <div className="card-premium p-8 flex flex-col justify-between">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Mix de Asesoras</h3>
                            <div className="h-48">
                                <ResponsiveContainer>
                                    <PieChart>
                                        <Pie data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} innerRadius={50} outerRadius={75} paddingAngle={8} dataKey="value">
                                            <Cell fill="#671E75" />
                                            <Cell fill="#00C7B1" />
                                            <Cell fill="#C084FC" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="space-y-3 mt-6 text-[11px] font-black uppercase">
                                <div className="flex justify-between text-morada"><span>Montserrat</span><span>${current.monse?.toLocaleString()}</span></div>
                                <div className="flex justify-between text-[#00C7B1]"><span>Jessica</span><span>${current.jess?.toLocaleString()}</span></div>
                                <div className="flex justify-between text-purple-400"><span>Marla</span><span>${current.marla?.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </div>

                    {/* Barra de Pisos (60, 101, 121, 151) */}
                    <div className="card-premium p-10 overflow-hidden">
                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-12">Análisis de Pisos de Venta</h3>
                        <div className="relative pt-2 pb-16 px-4">
                            <div className="h-4 bg-slate-100 rounded-full w-full absolute shadow-inner"></div>
                            <div className="h-4 shimmer rounded-full absolute transition-all duration-1000" style={{ width: `${Math.min(100, (current.cantado / (current.meta * 1.51)) * 100)}%` }}></div>
                            
                            <div className="relative flex justify-between mt-12">
                                {[60, 101, 121, 151].map(p => {
                                    const montoPiso = (current.meta * p) / 100;
                                    const logrado = current.cantado >= montoPiso;
                                    return (
                                        <div key={p} className="flex flex-col items-center">
                                            <div className={`w-6 h-6 rounded-full border-4 border-white shadow-md transition-all duration-500 ${logrado ? 'bg-morada scale-125 shadow-purple-200' : 'bg-slate-200'}`}></div>
                                            <span className={`text-xs font-black mt-4 ${logrado ? 'text-morada' : 'text-slate-300'}`}>{p}%</span>
                                            <span className="text-[10px] font-bold text-slate-300 hidden md:block">${montoPiso.toLocaleString()}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
