<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoradaUno Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8F6F9]">
    <div id="root"></div>

    <script type="text/babel">
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = React.useState([]);
            const [activeMonth, setActiveMonth] = React.useState("");
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                // MÉTODO GOOGLE VISUALIZATION (Evita bloqueos de seguridad)
                const sheetId = '1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq'; // ID de tu hoja
                const gid = '1811147079';
                const url = `https://docs.google.com/spreadsheets/d/e/2PACX-${sheetId}/pub?gid=${gid}&single=true&output=csv`;

                fetch(url)
                    .then(response => response.text())
                    .then(csvText => {
                        const rows = csvText.split('\n').map(row => row.split(','));
                        const headers = rows[0].map(h => h.trim().replace(/"/g, ''));
                        
                        const jsonData = rows.slice(1).map(row => {
                            let obj = {};
                            headers.forEach((header, i) => {
                                obj[header] = row[i] ? row[i].trim().replace(/"/g, '') : "";
                            });
                            return obj;
                        });

                        const clean = jsonData
                            .filter(r => r.QMesEquipo)
                            .map(r => {
                                const n = (v) => parseFloat(v?.replace(/[^0-9.-]+/g, "")) || 0;
                                return {
                                    mes: r.QMesEquipo,
                                    total: n(r.CantadoEquipo),
                                    meta: n(r["Meta RevenueEquipo"]),
                                    alcance: n(r["Alcance mesEquipo"]),
                                    monse: n(r.cantadoMonse),
                                    jess: n(r.cantadoJess),
                                    marla: n(r.cantadoMarla)
                                };
                            });

                        setData(clean);
                        if(clean.length > 0) setActiveMonth(clean[clean.length-1].mes);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-purple-800">CONECTANDO CON DATOS...</div>;
            if (data.length === 0) return <div className="h-screen flex items-center justify-center text-red-500">Error: No se pudieron leer los datos del Excel.</div>;

            const current = data.find(d => d.mes === activeMonth) || data[0];

            return (
                <div className="max-w-5xl mx-auto p-4">
                    <header className="flex justify-between items-center my-6 bg-white p-4 rounded-2xl shadow-sm">
                        <h1 className="text-xl font-black text-purple-900 italic">MORADAUNO</h1>
                        <select 
                            value={activeMonth} 
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-purple-50 p-2 rounded-xl font-bold text-purple-700 outline-none"
                        >
                            {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                        </select>
                    </header>

                    <div className={`p-8 rounded-[2rem] text-white mb-8 transition-all ${current.alcance >= 100 ? 'bg-teal-500' : 'bg-purple-800'}`}>
                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-80">Total Cantado Equipo</p>
                        <div className="flex justify-between items-center">
                            <h2 className="text-5xl font-black">${current.total.toLocaleString()}</h2>
                            <div className="text-right">
                                <p className="text-4xl font-black">{current.alcance}%</p>
                                <p className="text-[10px] opacity-70 font-bold tracking-widest uppercase">Alcance</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-sm h-72">
                            <h3 className="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Performance</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={data}>
                                    <XAxis dataKey="mes" hide />
                                    <Tooltip />
                                    <Bar dataKey="total" radius={[5, 5, 0, 0]}>
                                        {data.map((entry, index) => (
                                            <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#E2E8F0'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="bg-white p-6 rounded-3xl shadow-sm h-72">
                            <h3 className="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Mix de Ventas</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie 
                                        data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} 
                                        dataKey="value" innerRadius={50} outerRadius={70}
                                    >
                                        <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
