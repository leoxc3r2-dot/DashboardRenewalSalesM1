// ─────────────────────────────────────────────
//  PARSER: TSV → DATA_BY_MONTH + QUARTERLY_DATA
//  Estructura esperada del Sheet (columnas A–Z):
//
//  Row 1: encabezados (se ignoran)
//  Cada fila representa el "EQUIPO" de un mes:
//    col0=mes, col1=meta_corriente, col2=acumulado_corriente,
//    col3=recuperado_total, col4=recuperado_cantado, col5=piso_60,
//    col6=acumulado_total, col7=total_alcance, col8=alcance_corriente
//  Luego 3 bloques de vendedora (9 cols cada una):
//    name, meta_mes, acumulado_mes, alcance_mes, faltan_mes,
//    recuperado, acumulado_total, alcance_total, ticket_promedio, volumen,
//    piso60_monto, piso101_monto, piso121_monto, piso151_monto
//
//  Si el Sheet no tiene esa estructura exacta, los datos hardcoded
//  sirven como fallback automático.
// ─────────────────────────────────────────────
function parseTSV(raw) {
  try {
    const lines = raw.trim().split('\n').map(l => l.split('\t').map(c => c.trim()));
    if (lines.length < 2) return null;

    // Detectar si primera fila es encabezado
    const startRow = isNaN(Number(lines[0][1])) ? 1 : 0;
    const dataByMonth = {};
    const quarterlyData = {};

    for (let i = startRow; i < lines.length; i++) {
      const r = lines[i];
      if (!r[0] || r[0] === '') continue;

      const mes = r[0];
      const n = (idx) => parseFloat(r[idx]) || 0;

      // Equipo (cols 1-8)
      const equipo = {
        meta_corriente:     n(1),
        acumulado_corriente:n(2),
        recuperado_total:   n(3),
        recuperado_cantado: n(4),
        piso_60:            n(5),
        acumulado_total:    n(6),
        total_alcance:      n(7),
        alcance_corriente:  n(8)
      };

      // Vendedoras: offset 9, cada vendedora ocupa 14 columnas
      const vendedoras = [];
      const vOffset = 9;
      const vCols = 14;
      const numVendedoras = 3;
      for (let v = 0; v < numVendedoras; v++) {
        const o = vOffset + v * vCols;
        const name = r[o] || `Vendedora ${v+1}`;
        if (!name || name === '') continue;
        vendedoras.push({
          name,
          meta_mes:       n(o+1),
          acumulado_mes:  n(o+2),
          alcance_mes:    n(o+3),
          faltan_mes:     n(o+4),
          recuperado:     n(o+5),
          acumulado_total:n(o+6),
          alcance_total:  n(o+7),
          ticket_promedio:n(o+8),
          volumen:        n(o+9),
          pisos: [
            { label:"60%",  monto: n(o+10) },
            { label:"101%", monto: n(o+11) },
            { label:"121%", monto: n(o+12) },
            { label:"151%", monto: n(o+13) }
          ]
        });
      }

      if (vendedoras.length === 0) continue;
      dataByMonth[mes] = { equipo, vendedoras };
    }

    if (Object.keys(dataByMonth).length === 0) return null;

    // Reconstruir datos trimestrales automáticamente de los meses cargados
    const meses = Object.keys(dataByMonth);
    const q1Meses = ["Enero","Febrero","Marzo"].filter(m => dataByMonth[m]);
    const q2Meses = ["Abril","Mayo","Junio"].filter(m => dataByMonth[m]);

    const buildQ = (qMeses) => {
      if (qMeses.length === 0) return null;
      const mensual = qMeses.map(m => ({
        mes: m,
        revenue: dataByMonth[m].equipo.acumulado_total,
        ticket: dataByMonth[m].vendedoras.reduce((s,v) => s + (v.ticket_promedio || 0), 0) / dataByMonth[m].vendedoras.filter(v=>v.ticket_promedio>0).length || 0
      }));
      const totalRev = mensual.reduce((s,m) => s+m.revenue, 0);
      const totalTicket = mensual.reduce((s,m) => s+m.ticket, 0) / mensual.length;
      // Metas trimestrales: suma de metas mensuales del equipo
      const metaRev = qMeses.reduce((s,m) => s + dataByMonth[m].equipo.meta_corriente, 0);
      return {
        meta_revenue: metaRev,
        output_revenue: totalRev,
        alcance_revenue: metaRev > 0 ? Math.round((totalRev/metaRev)*100) : 100,
        meta_ticket: 6500,
        output_ticket: Math.round(totalTicket),
        alcance_ticket: Math.round((totalTicket/6500)*100),
        mensual
      };
    };

    const q1 = buildQ(q1Meses);
    const q2 = buildQ(q2Meses);
    if (q1) quarterlyData["Q1"] = q1;
    if (q2) quarterlyData["Q2"] = q2;

    // Fallback: si no hay Q, usar estáticos
    if (!q1) quarterlyData["Q1"] = QUARTERLY_DATA_STATIC["Q1"];
    if (!q2) quarterlyData["Q2"] = QUARTERLY_DATA_STATIC["Q2"];

    return { dataByMonth, quarterlyData };
  } catch(e) {
    console.error("Error parseando TSV:", e);
    return null;
  }
}

            stroke={ok?'#fff':'#772583'} strokeWidth="8" fill="transparent"
            strokeDasharray="251.2"
            strokeDashoffset={251.2 - (251.2 * Math.min(percentage,100)) / 100}

          <span style={{fontSize:'1.1rem',fontWeight:900,color:ok?'#fff':'#0F172A'}}>{percentage}%</span>

  );
};

// Tooltip personalizado
const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload || !payload.length) return null;
  const total = payload.reduce((s,e) => s+e.value, 0);
  return (
    <div style={{background:'#fff',padding:'1rem',borderRadius:'1rem',boxShadow:'0 10px 30px rgba(0,0,0,0.12)',border:'1px solid #F1F5F9',minWidth:200}}>
      <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8',marginBottom:8,paddingBottom:8,borderBottom:'1px solid #F1F5F9'}}>{label}</p>
      {payload.map((e,i) => {
        const pct = total > 0 ? ((e.value/total)*100).toFixed(1) : 0;
        return (
          <div key={i} style={{marginBottom:6}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:8,height:8,borderRadius:2,background:e.fill}} />
                <span style={{fontSize:11,fontWeight:700,color:'#475569',textTransform:'capitalize'}}>{e.name}</span>
              </div>
              <span style={{fontSize:11,fontWeight:900,color:'#0F172A'}}>{pct}%</span>
            </div>
            <p style={{fontSize:10,color:'#94A3B8',marginLeft:14}}>{fmt(e.value)}</p>
          </div>
        );
      })}
      <div style={{borderTop:'1px solid #F1F5F9',paddingTop:8,marginTop:4,display:'flex',justifyContent:'space-between'}}>
        <span style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#0F172A'}}>Total</span>
        <span style={{fontSize:11,fontWeight:900,color:'#671E75'}}>{fmt(total)}</span>
      </div>
    </div>
  );
};

// Hitos de comisión
const MilestoneProgress = ({ name, current, milestones }) => {
  const maxMonto = milestones && milestones.length > 0 ? milestones[milestones.length-1].monto : 1;
  const progressPct = maxMonto > 0 ? (current/maxMonto)*100 : 0;

  return (
    <div style={{
      background:'#fff', border:'1px solid rgba(103,30,117,0.08)',
      borderRadius:'2.5rem', padding:'2rem 2.5rem 2.5rem',
      boxShadow:'0 2px 8px rgba(0,0,0,0.04)', marginBottom:16
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'3.5rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#772583',boxShadow:'0 2px 8px rgba(119,37,131,0.3)'}} />
          <h4 style={{fontWeight:900,fontSize:13,textTransform:'uppercase',letterSpacing:'0.2em',color:'#0F172A'}}>Pisos {name}</h4>
        </div>
        <div style={{padding:'6px 16px',background:'#F7EEF8',borderRadius:20,border:'1px solid rgba(103,30,117,0.15)'}}>
          <span style={{fontSize:13,fontWeight:900,color:'#671E75'}}>{fmt(current)}</span>
        </div>
      </div>

      <div style={{position:'relative', paddingBottom: 80, paddingTop: 12, paddingLeft:16, paddingRight:16}}>
        {/* track */}
        <div style={{position:'absolute',height:12,background:'#F1F5F9',left:16,right:16,top:8,borderRadius:6,boxShadow:'inset 0 2px 4px rgba(0,0,0,0.06)'}} />
        {/* fill */}
        <div style={{
          position:'absolute', height:12,
          background:'linear-gradient(90deg, #671E75, #B14EB5)',
          left:16, top:8, borderRadius:6,
          width:`calc(${Math.min(100,progressPct)}% - 32px)`,
          boxShadow:'0 4px 12px rgba(119,37,131,0.2)',
          transition:'width 1s ease-out'
        }} />

        {/* marcadores */}
        <div style={{position:'relative',display:'flex',width:'100%'}}>
          {milestones && milestones.map((m, idx) => {
            if (m.monto === 0 && idx > 0) return null;
            const isReached = current >= m.monto && m.monto > 0;
            const leftPct = maxMonto > 0 ? (m.monto/maxMonto)*100 : 0;
            return (
              <div key={idx} style={{
                position:'absolute',
                left:`${leftPct}%`,
                transform:'translateX(-50%)',
                display:'flex',flexDirection:'column',alignItems:'center'
              }}>
                <div style={{
                  width:20, height:20, borderRadius:'50%',
                  border: isReached ? '3px solid #fff' : '3px solid #E2E8F0',
                  background: isReached ? '#772583' : '#fff',
                  boxShadow: isReached ? '0 2px 8px rgba(119,37,131,0.4)' : 'none',
                  zIndex:2, transition:'all 0.5s'
                }} />
                <div style={{marginTop:16,display:'flex',flexDirection:'column',alignItems:'center',whiteSpace:'nowrap'}}>
                  <span style={{fontSize:12,fontWeight:900,color: isReached?'#671E75':'#94A3B8',letterSpacing:'-0.01em'}}>{m.label}</span>
                  <span style={{fontSize:10,fontWeight:700,color:'#94A3B8',marginTop:2}}>{fmt(m.monto)}</span>
                  {!isReached && m.monto > 0 && (
                    <div style={{marginTop:6,padding:'2px 6px',background:'#FEF2F2',borderRadius:6,border:'1px solid #FECACA'}}>
                      <span style={{fontSize:9,fontWeight:900,color:'#EF4444',textTransform:'uppercase',letterSpacing:'0.05em'}}>
                        Faltan: {fmt(m.monto-current)}
                      </span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────
//  APP PRINCIPAL
// ─────────────────────────────────────────────
function App() {
  const [dataByMonth, setDataByMonth] = useState(DATA_BY_MONTH_STATIC);
  const [quarterlyData, setQuarterlyData] = useState(QUARTERLY_DATA_STATIC);
  const [loadingSheet, setLoadingSheet] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [sheetError, setSheetError] = useState(false);
  const [refreshing, setRefreshing] = useState(false);

  const [selectedMonth, setSelectedMonth] = useState("Abril");
  const [selectedQ, setSelectedQ] = useState("Q1");

  const currentDayOfMonth = 15;
  const currentDaysTranscurridos = 30 + currentDayOfMonth;
  const totalVentanaDays = 60;

  // ── Carga del Sheet ──
  const fetchSheet = useCallback(async (silent=false) => {
    if (!silent) setLoadingSheet(true);
    else setRefreshing(true);
    try {
      const res = await fetch(SHEET_URL + `&_cb=${Date.now()}`);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const raw = await res.text();
      const parsed = parseTSV(raw);
      if (parsed) {
        setDataByMonth(parsed.dataByMonth);
        setQuarterlyData(parsed.quarterlyData);
        setSheetError(false);
        setLastUpdated(new Date());
        // Asegurarnos que el mes seleccionado existe
        const meses = Object.keys(parsed.dataByMonth);
        if (meses.length && !parsed.dataByMonth[selectedMonth]) {
          setSelectedMonth(meses[meses.length-1]);
        }
      } else {
        setSheetError(true);
      }
    } catch(e) {
      console.warn("No se pudo cargar el Sheet, usando datos estáticos.", e);
      setSheetError(true);
    } finally {
      setLoadingSheet(false);
      setRefreshing(false);
    }
  }, [selectedMonth]);

  useEffect(() => {
    fetchSheet(false);
    const interval = setInterval(() => fetchSheet(true), AUTO_REFRESH_MS);
    return () => clearInterval(interval);
  }, []);

  // ── Datos derivados ──
  const data = useMemo(() => dataByMonth[selectedMonth] || Object.values(dataByMonth)[0], [dataByMonth, selectedMonth]);
  const qData = useMemo(() => quarterlyData[selectedQ] || Object.values(quarterlyData)[0], [quarterlyData, selectedQ]);

  const compositionData = useMemo(() => [
    { name:'Renovaciones', value: data.equipo.acumulado_corriente, color:'#9333EA' },
    { name:'Recuperado',   value: data.equipo.recuperado_total,    color:'#10B981' }
  ].filter(d => d.value > 0), [data]);

  const projections = useMemo(() => data.vendedoras.map(v => {
    if (v.meta_mes === 0) return null;
    const dailyAvg = v.acumulado_total / currentDaysTranscurridos;
    const projected = dailyAvg * totalVentanaDays;
    const pace = (projected / v.meta_mes) * 100;
    return {
      name: v.name,
      current: v.acumulado_total,
      projected,
      pace: pace.toFixed(0),
      status: pace >= 100 ? 'success' : pace >= 85 ? 'warning' : 'danger'
    };
  }).filter(Boolean), [data, currentDaysTranscurridos, totalVentanaDays]);

  const qAnalysis = useMemo(() => {
    if (!qData || !qData.mensual.length) return null;
    const sorted = [...qData.mensual].sort((a,b) => b.revenue-a.revenue);
    const best = sorted[0];
    const total = qData.mensual.reduce((s,m) => s+m.revenue, 0);
    const avg = total / qData.mensual.length;
    return {
      bestMonthName: best.mes,
      performanceRatio: (((best.revenue/avg)-1)*100).toFixed(1)
    };
  }, [qData]);

  const mainChartData = [{ name:'Equipo Total', renovaciones: data.equipo.acumulado_corriente, recuperado: data.equipo.recuperado_total }];
  const sellersChartData = useMemo(() => data.vendedoras.map(v => ({
    name: v.name, renovaciones: v.acumulado_mes, recuperado: v.recuperado, total: v.acumulado_total
  })), [data]);
  const maxQRevenue = Math.max(...(qData.mensual || []).map(d => d.revenue));
  const meses = Object.keys(dataByMonth);

  if (loadingSheet) return (
    <div>
      <div className="accent-bar" />
      <div className="loader-wrap">
        <div className="loader-logo">Morada<span>Uno</span></div>
        <div className="loader-bar"><div className="loader-bar-inner" /></div>
        <p className="loader-text">Cargando datos del dashboard…</p>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh', background:'#F4F0F5', fontFamily:"'Figtree', sans-serif", paddingBottom:80 }}>

      {/* Accent bar */}
      <div className="accent-bar" />

      {/* Navbar */}
      <nav style={{
        background:'#fff', borderBottom:'1px solid rgba(103,30,117,0.1)',
        position:'sticky', top:0, zIndex:50,
        padding:'0.75rem 1.5rem',
        display:'flex', flexWrap:'wrap', alignItems:'center',
        justifyContent:'space-between', gap:12,
        boxShadow:'0 1px 4px rgba(0,0,0,0.06)'

        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <svg width="30" height="24" viewBox="0 0 36 28" fill="none">

            <path d="M9 0L18 8L9 17V0Z" fill="#B14EB5"/>

          </svg>
          <span style={{fontWeight:900,fontSize:17,color:'#671E75',letterSpacing:'-0.02em'}}>
            MoradaUno <span style={{color:'#BCBEC0',fontWeight:300}}>|</span>{' '}
            <span style={{color:'#772583'}}>Renewal Sales</span>
          </span>

        {/* Controles */}

                <div key={i} style={{marginBottom:16}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:item.color}} />
                      <span style={{fontSize:11,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.05em',color:'#334155'}}>{item.name}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:900,color:'#0F172A'}}>
                      {Math.round((item.value/(data.equipo.acumulado_total||1))*100)}%
                    </span>
                  </div>
                  <div style={{background:'#F8FAFC',height:8,borderRadius:4,overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:4,background:item.color,width:`${(item.value/(data.equipo.acumulado_total||1))*100}%`,transition:'width 1s ease-out'}} />
                  </div>
                  <p style={{fontSize:10,fontWeight:700,color:'#94A3B8',marginTop:3}}>{fmt(item.value)}</p>
                </div>
              ))}
              <div style={{padding:'10px 14px',background:'#F7EEF8',borderRadius:12,border:'1px solid rgba(103,30,117,0.1)',display:'flex',gap:8,marginTop:8}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B14EB5" strokeWidth="2" strokeLinecap="round" style={{marginTop:1,flexShrink:0}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <p style={{fontSize:10,fontWeight:500,color:'#475569',lineHeight:1.6,fontStyle:'italic'}}>
                  {data.equipo.recuperado_total > 0
                    ? `La recuperación de cartera aportó ${fmt(data.equipo.recuperado_total)}, representando un impulsor crítico para el alcance del ${data.equipo.total_alcance}% de la meta.`
                    : "Este mes se ha fondeado exclusivamente con renovaciones corrientes de calendario."}
                </p>
              </div>
            </div>
          </div>
        </div>

        {/* Cards vendedoras */}
        <p style={{fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.15em',color:'#94A3B8',marginBottom:12}}>Estatus por Vendedora — {selectedMonth}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:24}} className="md-grid-3">
          {data.vendedoras.map(v => (
            <div key={v.name} style={{background:'#fff',borderRadius:'2rem',border:'1px solid rgba(103,30,117,0.08)',padding:'1.25rem',boxShadow:'0 2px 8px rgba(0,0,0,0.04)',display:'flex',flexDirection:'column'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <h4 style={{fontWeight:900,fontSize:14,textTransform:'uppercase',letterSpacing:'0.05em',color:'#0F172A'}}>{v.name}</h4>
                <span style={{fontSize:8,fontWeight:900,letterSpacing:'0.05em',padding:'3px 8px',borderRadius:6,background:'#F7EEF8',color:'#671E75',textTransform:'uppercase'}}>RENEWAL</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                {[
                  ['Meta Mes', fmt(v.meta_mes), '#94A3B8'],
                  ['Alcance Mes', `${v.alcance_mes}%`, '#9333EA'],
                  ['Recuperado', fmt(v.recuperado), '#10B981'],
                  ['Faltante', fmt(v.faltan_mes > 0 ? v.faltan_mes : 0), '#EF4444'],
                ].map(([label, val, color]) => (
                  <div key={label}>
                    <p style={{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#94A3B8',marginBottom:3}}>{label}</p>
                    <p style={{fontSize:13,fontWeight:900,color}}>{val}</p>
                  </div>
                ))}
              </div>
              <div style={{padding:'10px 12px',background:'#F8FAFC',borderRadius:12,border:'1px solid #F1F5F9',marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <p style={{fontSize:8,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8'}}>Ticket Promedio</p>
                  <p style={{fontSize:12,fontWeight:900,color:'#671E75'}}>{fmt(v.ticket_promedio)}</p>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <p style={{fontSize:8,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8'}}>Volumen Cierre</p>
                  <p style={{fontSize:11,fontWeight:900,color:'#0F172A'}}>{v.volumen} unidades</p>
                </div>
              </div>
              <div style={{marginTop:'auto',paddingTop:12,borderTop:'1px solid #F8FAFC'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:4}}>
                  <div>
                    <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#94A3B8'}}>Acumulado Total</p>
                    <p style={{fontSize:15,fontWeight:900,color:'#0F172A'}}>{fmt(v.acumulado_total)}</p>
                  </div>
                  <p style={{fontSize:15,fontWeight:900,color:'#671E75'}}>{v.alcance_total}%</p>
                </div>
                <ProgressBar progress={v.alcance_total} color="#772583" />
              </div>
            </div>
          ))}
        </div>

        {/* Gráfico comparativo vendedoras */}
        <div style={{background:'#fff',borderRadius:'2rem',border:'1px solid rgba(103,30,117,0.08)',padding:'1.5rem',marginBottom:16,boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
          <h3 style={{fontWeight:700,fontSize:14,color:'#1E293B',marginBottom:4,display:'flex',alignItems:'center',gap:8}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#772583" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Comparativa de Resultados por Vendedora
          </h3>
          <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'#94A3B8',marginBottom:'1.5rem'}}>Desglose Renovaciones vs Recuperado</p>
          <div style={{height:280}}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={sellersChartData} layout="vertical" margin={{top:5,right:120,left:50,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" horizontal vertical={false} stroke="#F1F5F9" />
                <XAxis type="number" hide />
                <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fontSize:11,fontWeight:900,fill:'#1E1B4B'}} />
                <Tooltip cursor={{fill:'#F7EEF8'}} content={<CustomTooltip />} />
                <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{paddingBottom:16,fontSize:10,fontWeight:700,textTransform:'uppercase'}} />
                <Bar name="Renovaciones" dataKey="renovaciones" stackId="v" fill="#9333EA" barSize={32} />
                <Bar name="Recuperado"   dataKey="recuperado"   stackId="v" fill="#10B981" barSize={32} radius={[0,8,8,0]}>
                  <LabelList dataKey="total" position="right" formatter={v=>fmt(v)} style={{fill:'#475569',fontSize:11,fontWeight:900}} offset={10} />
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Run Rate / Proyecciones */}
        <div style={{background:'#fff',borderRadius:'2.5rem',border:'1px solid rgba(103,30,117,0.08)',padding:'2rem',marginBottom:32,boxShadow:'0 2px 8px rgba(0,0,0,0.04)',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,right:0,color:'#F8FAFC',pointerEvents:'none'}}>
            <svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
          </div>
          <div style={{position:'relative',zIndex:1}}>
            <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'2rem',gap:16}}>
              <div style={{display:'flex',alignItems:'center',gap:14}}>
                <div style={{padding:12,background:'#0F172A',color:'#fff',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                  <h4 style={{fontWeight:900,fontSize:16,textTransform:'uppercase',letterSpacing:'0.1em',color:'#0F172A',lineHeight:1}}>Análisis de Run Rate (Ventana 60 Días)</h4>
                  <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8',marginTop:6,display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:'#772583',display:'inline-block'}} />
                    Corte al Día {currentDayOfMonth} del mes actual ({currentDaysTranscurridos} días de gestión)
                  </p>
                </div>
              </div>
              <div style={{padding:'12px 16px',background:'#F8FAFC',borderRadius:16,border:'1px solid #F1F5F9',maxWidth:280}}>
                <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.08em',color:'#64748B',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#772583" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  Nueva Metodología
                </p>
                <p style={{fontSize:10,color:'#94A3B8',fontWeight:500,lineHeight:1.6,fontStyle:'italic'}}>
                  Ventana de 60 días: Los resultados actuales representan 45 días de avance vs un cierre a los 60 días.
                </p>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:`repeat(${projections.length},1fr)`,gap:24}} className="md-grid-3">
              {projections.map((proj, idx) => {
                const statusColors = {
                  success: { bg:'#ECFDF5', border:'#D1FAE5', text:'#059669', label:'En Ritmo' },
                  warning: { bg:'#FFFBEB', border:'#FDE68A', text:'#D97706', label:'Ajustado' },
                  danger:  { bg:'#FEF2F2', border:'#FECACA', text:'#DC2626', label:'Bajo Ritmo' }
                };
                const sc = statusColors[proj.status];
                return (
                  <div key={idx}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                      <span style={{fontSize:12,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#0F172A'}}>{proj.name}</span>
                      <span style={{fontSize:9,fontWeight:900,padding:'4px 10px',borderRadius:20,textTransform:'uppercase',
                        background:sc.bg, color:sc.text, border:`1px solid ${sc.border}`}}>
                        {sc.label}
                      </span>
                    </div>
                    <div style={{background:'#F8FAFC',border:'1px solid #F1F5F9',padding:'1.5rem',borderRadius:'2rem',transition:'all 0.3s'}}>
                      <div style={{marginBottom:'1.5rem'}}>
                        <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.12em',color:'#94A3B8',marginBottom:6}}>Cierre Proyectado (Día 60)</p>
                        <h5 style={{fontSize:'1.4rem',fontWeight:900,color:'#0F172A',letterSpacing:'-0.02em'}}>{fmt(proj.projected)}</h5>
                        <p style={{fontSize:10,fontWeight:700,color:'#94A3B8',marginTop:4}}>vs {fmt(proj.current)} actuales</p>
                      </div>
                      <div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:6}}>
                          <span style={{fontSize:9,fontWeight:900,textTransform:'uppercase',color:'#64748B'}}>Pace / Meta</span>
                          <span style={{fontSize:14,fontWeight:900,color:proj.status==='success'?'#059669':'#DC2626'}}>{proj.pace}%</span>
                        </div>
                        <div style={{height:8,background:'#E2E8F0',borderRadius:4,overflow:'hidden'}}>
                          <div style={{
                            height:'100%',borderRadius:4,
                            background:proj.status==='success'?'#10B981':proj.status==='warning'?'#F59E0B':'#EF4444',
                            width:`${Math.min(100,proj.pace)}%`,transition:'width 1s ease-out'
                          }} />
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Pisos / Hitos */}
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24,padding:'0 4px'}}>
          <div style={{padding:10,background:'#fff',borderRadius:16,border:'1px solid rgba(103,30,117,0.1)',boxShadow:'0 2px 6px rgba(0,0,0,0.04)',color:'#671E75',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <h3 style={{fontWeight:900,fontSize:13,textTransform:'uppercase',letterSpacing:'0.2em',color:'#0F172A'}}>Hitos de Comisión (Pisos) — {selectedMonth}</h3>
        </div>
        {data.vendedoras.map(v => (
          <MilestoneProgress key={v.name} name={v.name} current={v.acumulado_total} milestones={v.pisos} />
        ))}

        {/* Desempeño Trimestral */}
        <div style={{marginTop:60,paddingTop:40,borderTop:'1px solid #F1F5F9'}}>
          <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',marginBottom:32,gap:16}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{padding:10,background:'#0F172A',color:'#fff',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </div>
              <div>
                <h3 style={{fontWeight:900,fontSize:13,textTransform:'uppercase',letterSpacing:'0.2em',color:'#0F172A'}}>Desempeño Trimestral</h3>
                <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8',marginTop:4}}>Histórico Consolidado</p>
              </div>
            </div>
            <div style={{position:'relative'}}>
              <select value={selectedQ} onChange={e=>setSelectedQ(e.target.value)} style={{
                appearance:'none', background:'#fff',
                border:'1px solid #E2E8F0', borderRadius:16, padding:'10px 36px 10px 20px',
                fontFamily:"'Figtree',sans-serif", fontSize:10, fontWeight:900,
                textTransform:'uppercase', letterSpacing:'0.15em', color:'#0F172A',
                cursor:'pointer', outline:'none', boxShadow:'0 1px 4px rgba(0,0,0,0.04)'
              }}>
                {Object.keys(quarterlyData).map(q => <option key={q} value={q}>{q} 2026</option>)}
              </select>
              <span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#94A3B8',fontSize:10}}>▾</span>
            </div>
          </div>

          {/* Revenue + Ticket */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}} className="md-grid-2">
            {[
              { label:`Revenue ${selectedQ}`, value:fmt(qData.output_revenue), meta:`Meta: ${fmt(qData.meta_revenue)}`, pct:qData.alcance_revenue, color:'#772583', bg:'#F7EEF8', badgeBg:'#F7EEF8', badgeColor:'#671E75' },
              { label:`Ticket Promedio ${selectedQ}`, value:fmt(qData.output_ticket), meta:`Objetivo: ${fmt(qData.meta_ticket)}`, pct:qData.alcance_ticket, color:'#10B981', bg:'#ECFDF5', badgeBg:'#ECFDF5', badgeColor:'#065F46' }
            ].map((item,i) => (
              <div key={i} style={{background:'#fff',padding:'1.5rem',borderRadius:'2rem',border:'1px solid #F1F5F9',boxShadow:'0 2px 6px rgba(0,0,0,0.04)',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:item.color}}>{item.label}</p>
                    <span style={{fontSize:9,fontWeight:900,padding:'3px 8px',borderRadius:12,background:item.badgeBg,color:item.badgeColor}}>{item.pct}%</span>
                  </div>
                  <p style={{fontSize:'1.4rem',fontWeight:900,color:'#0F172A'}}>{item.value}</p>
                  <p style={{fontSize:10,fontWeight:700,color:'#94A3B8',marginTop:4}}>{item.meta}</p>
                </div>
                <div style={{marginTop:16}}>
                  <ProgressBar progress={item.pct} color={item.color} />
                </div>
              </div>
            ))}
          </div>

          {/* Gráfico comparativa mensual trimestre */}
          <div style={{background:'#fff',padding:'2rem 2rem 2.5rem',borderRadius:'3rem',border:'1px solid #F1F5F9',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
            <h1 style={{color:'#1a1a1a',fontWeight:900,fontSize:16,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:48}}>
              Comparativa Mensual {selectedQ}
            </h1>
            <div style={{height:380,width:'100%',marginBottom:40}}>
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={qData.mensual} margin={{top:40,right:30,left:20,bottom:20}}>
                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#eef2f6" />
                  <XAxis dataKey="mes" axisLine={false} tickLine={false} tick={{fill:'#1a2b4b',fontSize:15,fontWeight:900}} dy={15} />
                  <YAxis axisLine={false} tickLine={false} tick={{fill:'#9ea7b5',fontSize:12,fontWeight:800}} tickFormatter={v=>`$${v/1000}k`} />
                  <Tooltip content={<CustomTooltip />} />
                  <Bar dataKey="revenue" radius={[16,16,16,16]} barSize={80} name="Revenue">
                    {qData.mensual.map((e,i) => (
                      <Cell key={i} fill={e.revenue===maxQRevenue?'#671E75':'#9333EA'} />
                    ))}
                    <LabelList dataKey="revenue" position="top" formatter={v=>`$${v.toLocaleString('es-MX')}`} style={{fill:'#1a1a1a',fontWeight:900,fontSize:13}} offset={14} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>

            {qAnalysis && (
              <div style={{borderTop:'1px solid #F1F5F9',paddingTop:32}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:24}} className="md-grid-3">
                  <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
                    <div style={{padding:12,background:'#F7EEF8',color:'#671E75',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="18" y="3" width="4" height="18"/><rect x="10" y="8" width="4" height="13"/><rect x="2" y="13" width="4" height="8"/></svg>
                    </div>
                    <div>
                      <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8',marginBottom:4}}>Mejor Mes</p>
                      <h4 style={{fontSize:'1.2rem',fontWeight:900,color:'#0F172A'}}>{qAnalysis.bestMonthName}</h4>
                      <span style={{fontSize:11,fontWeight:700,color:'#10B981',display:'flex',alignItems:'center',gap:4,marginTop:4}}>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                        Peak
                      </span>
                    </div>
                  </div>
                  <div style={{borderLeft:'1px solid #F1F5F9',borderRight:'1px solid #F1F5F9',paddingLeft:24,paddingRight:24}}>
                    <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#94A3B8',marginBottom:4}}>Varianza vs Promedio</p>
                    <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                      <span style={{fontSize:'1.4rem',fontWeight:900,color:'#671E75'}}>+{qAnalysis.performanceRatio}%</span>
                      <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'#64748B'}}>en {qAnalysis.bestMonthName}</span>
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',justifyContent:'center'}}>
                    <div style={{padding:'12px 16px',background:'#F8FAFC',borderRadius:16,border:'1px solid #F1F5F9'}}>
                      <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.1em',color:'#64748B',marginBottom:4}}>Comportamiento</p>
                      <p style={{fontSize:11,fontWeight:700,color:'#475569',lineHeight:1.6}}>
                        Se observa una {qAnalysis.performanceRatio > 10 ? 'concentración significativa' : 'distribución estable'} de ventas hacia el mes de {qAnalysis.bestMonthName}.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <footer style={{marginTop:48,textAlign:'center',fontSize:11,color:'#94A3B8',fontWeight:500}}>
          Datos en MXN · MoradaUno Renewal Sales Dashboard &copy; 2026 ·{' '}
          {lastUpdated
            ? `Última actualización: ${lastUpdated.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}`
            : 'Datos estáticos'}
          {sheetError && <span style={{color:'#F59E0B'}}> · ⚠ No se pudo conectar al Sheet</span>}
        </footer>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
