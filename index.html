<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MoradaUno</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Figtree', sans-serif; background: #F8F6F9; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        function App() {
            const [data, setData] = useState([]);
            const [error, setError] = useState(null);

            useEffect(() => {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                
                Papa.parse(url, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        console.log("Datos recibidos:", results.data);
                        const clean = results.data
                            .filter(r => r.QMesEquipo)
                            .map(row => ({
                                mes: row.QMesEquipo,
                                monse: parseFloat(row["Monse cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                                jess: parseFloat(row["Jess cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                                marla: parseFloat(row["Marla cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                            }));
                        setData(clean);
                    },
                    error: (err) => setError(err.message)
                });
            }, []);

            if (error) return <div className="p-10 text-red-500">Error: {error}</div>;
            if (data.length === 0) return <div className="p-10 text-purple-700 font-bold">Cargando datos de Google Sheets...</div>;

            return (
                <div className="p-8 max-w-5xl mx-auto">
                    <h1 className="text-3xl font-black text-[#671E75] mb-8">Ventas MoradaUno</h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-purple-100">
                            <p className="text-xs font-bold text-gray-400">MONTSERRAT</p>
                            <h2 className="text-2xl font-black text-[#671E75]">${data[data.length-1].monse.toLocaleString()}</h2>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-purple-100">
                            <p className="text-xs font-bold text-gray-400">JESSICA</p>
                            <h2 className="text-2xl font-black text-[#00C7B1]">${data[data.length-1].jess.toLocaleString()}</h2>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-purple-100">
                            <p className="text-xs font-bold text-gray-400">MARLA</p>
                            <h2 className="text-2xl font-black text-purple-400">${data[data.length-1].marla.toLocaleString()}</h2>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm h-80">
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart data={data}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                <XAxis dataKey="mes" />
                                <YAxis hide />
                                <Tooltip />
                                <Bar dataKey="monse" fill="#671E75" radius={[4, 4, 0, 0]} />
                                <Bar dataKey="jess" fill="#00C7B1" radius={[4, 4, 0, 0]} />
                                <Bar dataKey="marla" fill="#B14EB5" radius={[4, 4, 0, 0]} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
