<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoradaUno | Dashboard Comercial</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F8F6F9; color: #12051A; }
        .card-morada { background: white; border-radius: 2rem; border: 1px solid #F1F5F9; box-shadow: 0 10px 15px -3px rgba(103, 30, 117, 0.05); }
        .bg-morada { background-color: #671E75; }
        .text-morada { color: #671E75; }
        .progress-shimmer {
            background: linear-gradient(90deg, #671E75 0%, #8E2B9E 50%, #671E75 100%);
            background-size: 200% auto;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer { to { background-position: 200% center; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Extraemos los componentes de la librería cargada globalmente
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, PieChart, Pie, ReferenceLine 
        } = window.Recharts;

        const App = () => {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [activeMonth, setActiveMonth] = React.useState("");

            React.useEffect(() => {
                const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                
                Papa.parse(sheetUrl, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const clean = results.data.filter(r => r.QMesEquipo).map(row => {
                            const n = (v) => parseFloat(v?.replace(/[^0-9.-]+/g, "") || 0);
                            return {
                                name: row.QMesEquipo,
                                total: n(row.CantadoEquipo),
                                meta: n(row["Meta RevenueEquipo"]),
                                monse: n(row["Monse cantado"]),
                                jess: n(row["Jess cantado"]),
                                marla: n(row["Marla cantado"]),
                                alcance: n(row["Alcance Equipo (Meta)"]),
                                recuperado: n(row["Recuperado del MesEquipo"])
                            };
                        });
                        setData(clean);
                        if(clean.length > 0) setActiveMonth(clean[clean.length-1].name);
                        setLoading(false);
                    }
                });
            }, []);

            const current = React.useMemo(() => data.find(d => d.name === activeMonth) || {}, [data, activeMonth]);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-[#F8F6F9]">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-purple-200 border-t-purple-700 rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="font-black text-purple-900 tracking-widest text-xs uppercase">Conectando con MoradaUno...</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-[2rem] shadow-sm border border-purple-50">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-morada rounded-xl flex items-center justify-center text-white font-black text-xl italic shadow-md">M</div>
                            <div>
                                <h1 className="text-xl font-[900] text-slate-900">Dashboard <span className="text-[#00C7B1]">Comercial</span></h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Renewal Sales 2026</p>
                            </div>
                        </div>
                        <select 
                            value={activeMonth}
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-slate-50 border-none rounded-xl px-6 py-3 font-bold text-[#671E75] outline-none ring-2 ring-purple-50 cursor-pointer"
                        >
                            {data.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
                        </select>
                    </div>

                    {/* KPI Central */}
                    <div className={`p-8 md:p-12 rounded-[2.5rem] mb-10 transition-all duration-700 border-b-[10px] ${current.alcance >= 100 ? 'bg-[#00C7B1] text-white border-[#00A392]' : 'bg-white border-purple-100'}`}>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex-1 text-center md:text-left">
                                <p className="text-[11px] font-black uppercase tracking-[0.2em] mb-2 opacity-70">Total Cantado Equipo</p>
                                <h2 className="text-6xl font-[900] tracking-tighter">${current.total?.toLocaleString()}</h2>
                                <p className="mt-2 text-sm font-bold opacity-80 uppercase tracking-widest">Meta: ${current.meta?.toLocaleString()}</p>
                            </div>
                            <div className="bg-black/5 p-8 rounded-[2rem] text-center min-w-[200px]">
                                <p className="text-[10px] font-black uppercase mb-1 opacity-70 tracking-widest">Alcance</p>
                                <p className="text-5xl font-[900] tracking-tighter">{current.alcance}%</p>
                            </div>
                        </div>
                    </div>

                    {/* Gráficas */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                        <div className="lg:col-span-2 card-morada p-8">
                            <h3 className="font-black text-slate-400 text-[10px] uppercase tracking-[0.2em] mb-8">Performance por Mes</h3>
                            <div className="h-72">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={data}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 700}} />
                                        <YAxis hide />
                                        <Tooltip cursor={{fill: '#F8F6F9'}} contentStyle={{borderRadius: '1rem', border: 'none'}} />
                                        <Bar dataKey="total" radius={[8, 8, 0, 0]}>
                                            {data.map((entry, index) => (
                                                <Cell key={index} fill={entry.name === activeMonth ? '#671E75' : '#E2E8F0'} />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Mix de Asesoras */}
                        <div className="card-morada p-8">
                            <h3 className="font-black text-slate-400 text-[10px] uppercase tracking-[0.2em] mb-6">Mix de Ventas</h3>
                            <div className="h-48">
                                <ResponsiveContainer>
                                    <PieChart>
                                        <Pie data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} innerRadius={45} outerRadius={70} paddingAngle={8} dataKey="value">
                                            <Cell fill="#671E75" />
                                            <Cell fill="#00C7B1" />
                                            <Cell fill="#C084FC" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="mt-6 space-y-3">
                                <div className="flex justify-between text-[11px] font-black text-morada uppercase"><span>Montserrat</span><span>${current.monse?.toLocaleString()}</span></div>
                                <div className="flex justify-between text-[11px] font-black text-[#00C7B1] uppercase"><span>Jessica</span><span>${current.jess?.toLocaleString()}</span></div>
                                <div className="flex justify-between text-[11px] font-black text-purple-400 uppercase"><span>Marla</span><span>${current.marla?.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </div>

                    {/* Pisos de Venta (Lógica Original) */}
                    <div className="card-morada p-10 overflow-hidden">
                        <h3 className="font-black text-slate-400 text-[10px] uppercase tracking-[0.2em] mb-12">Análisis de Pisos de Venta</h3>
                        <div className="relative pt-2 pb-14 px-4">
                            <div className="h-4 bg-slate-100 rounded-full w-full absolute shadow-inner"></div>
                            <div className="h-4 progress-shimmer rounded-full absolute transition-all duration-1000 shadow-md" style={{ width: `${Math.min(100, (current.total / (current.meta * 1.51)) * 100)}%` }}></div>
                            
                            <div className="relative flex justify-between mt-10">
                                {[60, 101, 121, 151].map(p => {
                                    const montoPiso = current.meta * (p/100);
                                    const logrado = current.total >= montoPiso;
                                    return (
                                        <div key={p} className="flex flex-col items-center">
                                            <div className={`w-5 h-5 rounded-full border-4 border-white shadow-md transition-all ${logrado ? 'bg-morada scale-125' : 'bg-slate-200'}`}></div>
                                            <span className={`text-[12px] font-black mt-3 ${logrado ? 'text-morada' : 'text-slate-300'}`}>{p}%</span>
                                            <span className="text-[10px] font-bold text-slate-300 tracking-tighter">${montoPiso.toLocaleString()}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
