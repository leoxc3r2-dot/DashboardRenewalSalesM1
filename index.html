<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MoradaUno</title>
    
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.10.3/lib/Recharts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { background-color: #F8F6F9; font-family: sans-serif; }
        .loading-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <h1 style="color: #671E75; font-weight: bold;">INICIALIZANDO DASHBOARD...</h1>
            <p>Si esta pantalla no desaparece, presiona Ctrl+F5</p>
        </div>
    </div>

    <script type="text/babel">
        // Forzamos a que el código espere a que TODO esté cargado
        window.onload = () => {
            const { useState, useEffect } = React;
            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

            const App = () => {
                const [data, setData] = useState([]);
                const [loading, setLoading] = useState(true);
                const [error, setError] = useState(null);
                const [activeMonth, setActiveMonth] = useState("");

                useEffect(() => {
                    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                    
                    Papa.parse(url, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            try {
                                const formatted = results.data
                                    .filter(row => row.QMesEquipo)
                                    .map(row => {
                                        const cleanNum = (val) => {
                                            if (!val) return 0;
                                            return parseFloat(val.replace(/[^0-9.-]+/g, "")) || 0;
                                        };
                                        return {
                                            mes: row.QMesEquipo,
                                            cantado: cleanNum(row.CantadoEquipo),
                                            meta: cleanNum(row["Meta RevenueEquipo"]),
                                            alcance: cleanNum(row["Alcance mesEquipo"]),
                                            monse: cleanNum(row["cantadoMonse"]),
                                            jess: cleanNum(row["cantadoJess"]),
                                            marla: cleanNum(row["cantadoMarla"])
                                        };
                                    });
                                
                                if (formatted.length === 0) throw new Error("No se encontraron datos en el Excel");
                                
                                setData(formatted);
                                setActiveMonth(formatted[formatted.length - 1].mes);
                                setLoading(false);
                            } catch (err) {
                                setError(err.message);
                                setLoading(false);
                            }
                        },
                        error: (err) => {
                            setError("Error al conectar con Google Sheets");
                            setLoading(false);
                        }
                    });
                }, []);

                if (loading) return <div className="loading-screen"><h2 className="text-purple-700 font-bold animate-pulse">CARGANDO DATOS...</h2></div>;
                if (error) return <div className="loading-screen text-red-600 font-bold">ERROR: {error}</div>;

                const current = data.find(d => d.mes === activeMonth) || {};

                return (
                    <div className="p-4 md:p-8 max-w-6xl mx-auto">
                        <div className="bg-white p-6 rounded-3xl shadow-sm mb-6 flex justify-between items-center">
                            <h1 className="text-2xl font-black text-purple-900">MoradaUno <span className="text-teal-500 italic">Renewal</span></h1>
                            <select 
                                value={activeMonth} 
                                onChange={(e) => setActiveMonth(e.target.value)}
                                className="bg-purple-50 border-none p-2 rounded-lg font-bold text-purple-700"
                            >
                                {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                            </select>
                        </div>

                        <div className={`p-10 rounded-[2.5rem] mb-6 text-white transition-all ${current.alcance >= 100 ? 'bg-teal-500' : 'bg-purple-800'}`}>
                            <p className="text-xs font-bold uppercase tracking-widest opacity-80">Cantado Equipo</p>
                            <div className="flex justify-between items-end">
                                <h2 className="text-6xl font-black">${current.cantado?.toLocaleString()}</h2>
                                <div className="text-right">
                                    <p className="text-4xl font-black">{current.alcance}%</p>
                                    <p className="text-xs opacity-70">Meta: ${current.meta?.toLocaleString()}</p>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm h-80">
                                <h3 className="font-bold text-gray-400 text-xs uppercase mb-4">Performance</h3>
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={data}>
                                        <XAxis dataKey="mes" hide />
                                        <Tooltip />
                                        <Bar dataKey="cantado" radius={[5, 5, 0, 0]}>
                                            {data.map((entry, index) => (
                                                <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#E2E8F0'} />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm h-80">
                                <h3 className="font-bold text-gray-400 text-xs uppercase mb-4">Mix de Ventas</h3>
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie 
                                            data={[
                                                { name: 'Monse', value: current.monse },
                                                { name: 'Jess', value: current.jess },
                                                { name: 'Marla', value: current.marla }
                                            ]} 
                                            dataKey="value" 
                                            innerRadius={60} 
                                            outerRadius={80}
                                        >
                                            <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };
    </script>
</body>
</html>
