<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MoradaUno Local</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8F6F9; font-family: sans-serif; }
        .card-m { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(103, 30, 117, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = useState([]);
            const [activeMonth, setActiveMonth] = useState("");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // LEER ARCHIVO LOCAL
                Papa.parse("datos.csv", {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const formatted = results.data
                            .filter(row => row.QMesEquipo)
                            .map(row => {
                                const n = (v) => v ? parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0 : 0;
                                return {
                                    mes: row.QMesEquipo,
                                    total: n(row.CantadoEquipo),
                                    meta: n(row["Meta RevenueEquipo"]),
                                    alcance: n(row["Alcance mesEquipo"]),
                                    monse: n(row.cantadoMonse),
                                    jess: n(row.cantadoJess),
                                    marla: n(row.cantadoMarla)
                                };
                            });
                        setData(formatted);
                        if(formatted.length > 0) setActiveMonth(formatted[formatted.length-1].mes);
                        setLoading(false);
                    }
                });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-purple-800 animate-pulse">CARGANDO DATOS LOCALES...</div>;

            const current = data.find(d => d.mes === activeMonth) || data[0];

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-[#671E75] text-white w-10 h-10 rounded-xl flex items-center justify-center font-black italic text-xl">M</div>
                            <h1 className="text-xl font-black text-slate-800">MoradaUno Dashboard</h1>
                        </div>
                        <select 
                            value={activeMonth} 
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-purple-50 border-none font-bold px-6 py-3 rounded-2xl text-[#671E75] outline-none cursor-pointer"
                        >
                            {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                        </select>
                    </header>

                    <div className={`p-10 rounded-[3rem] mb-10 text-white shadow-xl transition-all duration-500 ${current.alcance >= 100 ? 'bg-teal-500' : 'bg-[#671E75]'}`}>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] mb-2 opacity-70">Cantado Equipo</p>
                        <div className="flex justify-between items-center">
                            <h2 className="text-6xl font-black tracking-tighter">${current.total.toLocaleString()}</h2>
                            <div className="bg-black/10 px-8 py-4 rounded-3xl text-center">
                                <p className="text-xs font-bold opacity-70 uppercase">Alcance</p>
                                <p className="text-4xl font-black">{current.alcance}%</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="card-m p-8 h-80">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6">Histórico</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={data}>
                                    <XAxis dataKey="mes" hide />
                                    <Tooltip />
                                    <Bar dataKey="total" radius={[8, 8, 0, 0]}>
                                        {data.map((entry, index) => (
                                            <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#E2E8F0'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="card-m p-8 h-80">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 text-center">Mix de Ventas</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie 
                                        data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} 
                                        dataKey="value" innerRadius={55} outerRadius={75}
                                    >
                                        <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
