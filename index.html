<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MoradaUno</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Figtree', sans-serif; background: #F8F6F9; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            // Accedemos a las gráficas de forma segura
            const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

            React.useEffect(() => {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                
                Papa.parse(url, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const clean = results.data
                            .filter(r => r.QMesEquipo)
                            .map(row => ({
                                mes: row.QMesEquipo,
                                monse: parseFloat(row["Monse cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                                jess: parseFloat(row["Jess cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                                marla: parseFloat(row["Marla cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                            }));
                        setData(clean);
                        setLoading(false);
                    }
                });
            }, []);

            if (loading) return (
                <div className="flex h-screen items-center justify-center">
                    <div className="text-xl font-black text-[#671E75] animate-bounce">CARGANDO MORADAUNO...</div>
                </div>
            );

            const actual = data[data.length - 1] || {monse:0, jess:0, marla:0};

            return (
                <div className="p-4 md:p-10 max-w-5xl mx-auto">
                    <header className="mb-10 text-center md:text-left">
                        <h1 className="text-4xl font-black text-[#671E75]">Dashboard Comercial</h1>
                        <p className="text-[#00C7B1] font-bold tracking-widest">REAL-TIME DATA</p>
                    </header>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-white p-8 rounded-[30px] shadow-lg border-b-8 border-[#671E75]">
                            <p className="text-[10px] font-black text-gray-400 uppercase mb-2">Montserrat</p>
                            <h2 className="text-3xl font-black text-[#671E75]">${actual.monse.toLocaleString()}</h2>
                        </div>
                        <div className="bg-white p-8 rounded-[30px] shadow-lg border-b-8 border-[#00C7B1]">
                            <p className="text-[10px] font-black text-gray-400 uppercase mb-2">Jessica</p>
                            <h2 className="text-3xl font-black text-[#00C7B1]">${actual.jess.toLocaleString()}</h2>
                        </div>
                        <div className="bg-white p-8 rounded-[30px] shadow-lg border-b-8 border-purple-400">
                            <p className="text-[10px] font-black text-gray-400 uppercase mb-2">Marla</p>
                            <h2 className="text-3xl font-black text-purple-500">${actual.marla.toLocaleString()}</h2>
                        </div>
                    </div>

                    <div className="bg-white p-6 md:p-10 rounded-[40px] shadow-2xl h-[450px]">
                        <h3 className="font-black text-[#671E75] mb-6 uppercase text-sm">Comparativo por Mes</h3>
                        <ResponsiveContainer width="100%" height="90%">
                            <BarChart data={data}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                <XAxis dataKey="mes" axisLine={false} tickLine={false} tick={{fill: '#671E75', fontWeight: 'bold', fontSize: 12}} />
                                <YAxis hide />
                                <Tooltip cursor={{fill: '#F8F6F9'}} contentStyle={{borderRadius:'20px', border:'none'}} />
                                <Bar dataKey="monse" name="Monse" fill="#671E75" radius={[10, 10, 0, 0]} />
                                <Bar dataKey="jess" name="Jess" fill="#00C7B1" radius={[10, 10, 0, 0]} />
                                <Bar dataKey="marla" name="Marla" fill="#B14EB5" radius={[10, 10, 0, 0]} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
