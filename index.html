<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoradaUno | Dashboard Interno</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/lib/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap');
        body { font-family: 'Figtree', sans-serif; background-color: #F8F6F9; }
        .animate-fade { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = useState([]);
            const [activeMonth, setActiveMonth] = useState("");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Cargamos el archivo CSV local
                Papa.parse("datos.csv", {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const cleanNum = (val) => {
                            if (!val) return 0;
                            return parseFloat(String(val).replace(/[^0-9.-]+/g, "")) || 0;
                        };

                        // Mapeo flexible por si las columnas tienen espacios extra
                        const formatted = results.data
                            .filter(row => row.Mes || row["Mes "])
                            .map(row => {
                                const getVal = (key) => {
                                    const foundKey = Object.keys(row).find(k => k.trim().toLowerCase().includes(key.toLowerCase()));
                                    return row[foundKey];
                                };

                                return {
                                    mes: (row.Mes || row["Mes "]).trim(),
                                    total: cleanNum(getVal("Equipo Cantado")),
                                    meta: cleanNum(getVal("Meta  Revenue")),
                                    alcance: cleanNum(getVal("Alcance mes")),
                                    monse: cleanNum(getVal("Monse cantado")),
                                    jess: cleanNum(getVal("Jess cantado")),
                                    marla: cleanNum(getVal("Marla cantado"))
                                };
                            });
                        
                        if (formatted.length > 0) {
                            setData(formatted);
                            setActiveMonth(formatted[formatted.length - 1].mes);
                        }
                        setLoading(false);
                    }
                });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-[#671E75] animate-pulse uppercase tracking-widest">Leyendo datos.csv...</div>;
            if (data.length === 0) return <div className="h-screen flex items-center justify-center text-red-500 font-bold p-10 text-center">No se encontraron datos. <br/> Revisa que el archivo se llame 'datos.csv' y las columnas coincidan.</div>;

            const current = data.find(d => d.mes === activeMonth) || data[0];

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-10 animate-fade">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border-l-[12px] border-[#671E75]">
                        <div>
                            <h1 className="text-3xl font-[900] text-[#671E75] italic tracking-tighter uppercase">Morada<span className="text-teal-500">Uno</span></h1>
                            <p className="text-[10px] font-black text-gray-400 tracking-[0.3em]">RENEWAL SALES DASHBOARD</p>
                        </div>
                        <select 
                            value={activeMonth} 
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-purple-50 border-none font-black px-6 py-3 rounded-2xl text-[#671E75] outline-none cursor-pointer"
                        >
                            {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                        </select>
                    </header>

                    {/* KPI Principal */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                        <div className={`lg:col-span-2 p-10 rounded-[3rem] text-white shadow-xl transition-all duration-500 ${current.alcance >= 100 ? 'bg-teal-500' : 'bg-[#671E75]'}`}>
                            <p className="text-[10px] font-black uppercase tracking-[0.4em] mb-4 opacity-70">Total Cantado Equipo</p>
                            <h2 className="text-6xl md:text-8xl font-[900] tracking-tighter mb-4">
                                ${current.total.toLocaleString('es-MX')}
                            </h2>
                            <div className="flex justify-between items-end mt-8 pt-8 border-t border-white/20">
                                <div>
                                    <p className="text-5xl font-[900]">{Math.round(current.alcance)}%</p>
                                    <p className="text-[10px] font-bold opacity-70 uppercase">Alcance del Mes</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs font-bold opacity-60">META: ${current.meta.toLocaleString()}</p>
                                </div>
                            </div>
                        </div>

                        {/* Mix Equipo */}
                        <div className="bg-white p-8 rounded-[3rem] shadow-md flex flex-col items-center justify-center">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase mb-6 tracking-widest">Mix por Asesora</h3>
                            <div className="w-full h-44">
                                <ResponsiveContainer>
                                    <PieChart>
                                        <Pie 
                                            data={[
                                                { name: 'Monse', value: current.monse },
                                                { name: 'Jess', value: current.jess },
                                                { name: 'Marla', value: current.marla }
                                            ]} 
                                            dataKey="value" innerRadius={55} outerRadius={75} paddingAngle={8}
                                        >
                                            <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="flex gap-4 mt-4 w-full justify-around">
                                <div className="text-center"><p className="text-[8px] font-black text-[#671E75]">MONSE</p><p className="text-xs font-bold">${Math.round(current.monse/1000)}k</p></div>
                                <div className="text-center"><p className="text-[8px] font-black text-teal-500">JESS</p><p className="text-xs font-bold">${Math.round(current.jess/1000)}k</p></div>
                                <div className="text-center"><p className="text-[8px] font-black text-purple-400">MARLA</p><p className="text-xs font-bold">${Math.round(current.marla/1000)}k</p></div>
                            </div>
                        </div>
                    </div>

                    {/* Histórico */}
                    <div className="bg-white p-10 rounded-[3rem] shadow-md h-80">
                        <h3 className="text-[10px] font-black text-gray-400 uppercase mb-6 tracking-widest">Evolución Mensual</h3>
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart data={data}>
                                <XAxis dataKey="mes" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: '900', fill: '#CBD5E1'}} />
                                <Tooltip cursor={{fill: '#F8F6F9', radius: 10}} contentStyle={{borderRadius: '1rem', border: 'none'}} />
                                <Bar dataKey="total" radius={[10, 10, 0, 0]}>
                                    {data.map((entry, index) => (
                                        <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#F1F5F9'} />
                                    ))}
                                </Bar>
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
