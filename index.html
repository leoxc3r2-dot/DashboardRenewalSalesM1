<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoradaUno | Renewal Sales Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .card-shadow { box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Label, Cell, PieChart, Pie } = window.Recharts;

        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";

        const formatCurrency = (val) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }).format(val || 0);

        // --- COMPONENTES ORIGINALES DEL TXT ---
        const ProgressBar = ({ progress, colorClass = "bg-purple-600" }) => (
            <div className="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden">
                <div className={`h-full rounded-full transition-all duration-1000 ${colorClass}`} style={{ width: `${Math.min(100, progress)}%` }} />
            </div>
        );

        const MilestoneProgress = ({ name, current, target }) => {
            // Pisos basados en la lógica del código original (60, 101, 121, 151)
            const milestones = [
                { label: "60%", monto: target * 0.6 },
                { label: "101%", monto: target * 1.01 },
                { label: "121%", monto: target * 1.21 },
                { label: "151%", monto: target * 1.51 }
            ];
            const maxMonto = milestones[3].monto;
            const progressPercent = (current / maxMonto) * 100;

            return (
                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm mb-10">
                    <div className="flex justify-between items-center mb-14">
                        <h4 className="font-black text-slate-900 text-sm uppercase tracking-widest">Pisos {name}</h4>
                        <div className="px-5 py-2 bg-purple-50 rounded-2xl border border-purple-100">
                            <span className="text-sm font-black text-purple-800">{formatCurrency(current)}</span>
                        </div>
                    </div>
                    <div className="relative pt-4 pb-24 px-8">
                        <div className="absolute h-3 bg-slate-100 left-8 right-8 rounded-full top-3"></div>
                        <div className="absolute h-3 bg-purple-600 left-8 rounded-full top-3 transition-all duration-1000" style={{ width: `calc(${Math.min(100, progressPercent)}% - 64px)` }}></div>
                        <div className="relative flex w-full">
                            {milestones.map((m, i) => {
                                const isReached = current >= m.monto;
                                return (
                                    <div key={i} className="absolute flex flex-col items-center" style={{ left: `${(m.monto / maxMonto) * 100}%`, transform: 'translateX(-50%)' }}>
                                        <div className={`w-5 h-5 rounded-full border-[3px] z-10 ${isReached ? 'bg-purple-600 border-white' : 'bg-white border-slate-200'}`}></div>
                                        <div className="mt-8 flex flex-col items-center whitespace-nowrap">
                                            <span className={`text-[13px] font-black ${isReached ? 'text-purple-700' : 'text-slate-400'}`}>{m.label}</span>
                                            <span className="text-[11px] font-bold text-slate-400 uppercase">{formatCurrency(m.monto)}</span>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedMonth, setSelectedMonth] = useState("");

            useEffect(() => {
                Papa.parse(GOOGLE_SHEET_URL, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const clean = results.data.filter(r => r.QMesEquipo).map(row => {
                            const n = (v) => parseFloat(v?.replace(/[^0-9.-]+/g, "") || 0);
                            return {
                                name: row.QMesEquipo,
                                acumulado: n(row.CantadoEquipo),
                                meta: n(row["Meta RevenueEquipo"]),
                                recuperado: n(row["Recuperado del MesEquipo"]),
                                monse: n(row["Monse cantado"]),
                                jess: n(row["Jess cantado"]),
                                marla: n(row["Marla cantado"]),
                                alcance: n(row["Alcance Equipo (Meta)"])
                            };
                        });
                        setRawData(clean);
                        if (clean.length > 0) setSelectedMonth(clean[clean.length - 1].name);
                        setLoading(false);
                    }
                });
            }, []);

            const current = useMemo(() => rawData.find(d => d.name === selectedMonth) || {}, [rawData, selectedMonth]);

            if (loading) return <div className="h-screen flex items-center justify-center font-black text-purple-700 animate-pulse">MORADAUNO | CARGANDO...</div>;

            return (
                <div className="max-w-7xl mx-auto p-6">
                    {/* NAV ORIGINAL */}
                    <nav className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-purple-700 rounded-lg flex items-center justify-center text-white font-bold">M</div>
                            <span className="font-black text-lg">MoradaUno | <span className="text-purple-700">Renewal Sales</span></span>
                        </div>
                        <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-slate-50 border-none font-black text-xs uppercase px-6 py-3 rounded-xl outline-none ring-1 ring-slate-200">
                            {rawData.map(d => <option key={d.name} value={d.name}>{d.name} 2026</option>)}
                        </select>
                    </nav>

                    {/* ACUMULADO CARD (Lógica del TXT) */}
                    <div className={`p-10 rounded-[2.5rem] mb-8 border transition-all ${current.alcance >= 100 ? 'bg-emerald-600 text-white shadow-emerald-200 shadow-xl' : 'bg-white border-slate-200'}`}>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex-1">
                                <p className={`text-[11px] font-black uppercase tracking-widest mb-2 ${current.alcance >= 100 ? 'text-emerald-100' : 'text-slate-400'}`}>Acumulado Total Equipo</p>
                                <h2 className="text-6xl font-black tracking-tighter">{formatCurrency(current.acumulado)}</h2>
                                <p className="mt-2 text-sm font-bold opacity-70">Meta del Mes: {formatCurrency(current.meta)}</p>
                            </div>
                            <div className="text-center px-12 border-x border-slate-100/20">
                                <p className="text-[10px] font-black uppercase mb-1">Alcance Total</p>
                                <div className="text-5xl font-black">{current.alcance}%</div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                        {/* GRÁFICO DE BARRAS */}
                        <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border border-slate-100">
                            <h3 className="font-black text-slate-800 text-xs uppercase tracking-widest mb-8">Revenue Mensual - {selectedMonth}</h3>
                            <div className="h-80">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={rawData}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 11, fontWeight: 700}} />
                                        <YAxis hide domain={[0, 'dataMax + 1000000']} />
                                        <Tooltip cursor={{fill: '#F8FAFC'}} contentStyle={{borderRadius: '1.5rem', border: 'none'}} />
                                        <Bar dataKey="acumulado" radius={[12, 12, 0, 0]}>
                                            {rawData.map((entry, index) => (
                                                <Cell key={index} fill={entry.name === selectedMonth ? '#6B21A8' : '#E2E8F0'} />
                                            ))}
                                        </Bar>
                                        <ReferenceLine y={current.meta} stroke="#EF4444" strokeDasharray="5 5">
                                            <Label value="META" position="top" style={{fill: '#EF4444', fontSize: '10px', fontWeight: 900}} />
                                        </ReferenceLine>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* COMPOSICIÓN (PIE) */}
                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100">
                            <h3 className="font-black text-slate-800 text-xs uppercase tracking-widest mb-6">Mix de Ventas</h3>
                            <div className="h-64">
                                <ResponsiveContainer>
                                    <PieChart>
                                        <Pie data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} innerRadius={60} outerRadius={80} paddingAngle={8} dataKey="value">
                                            <Cell fill="#6B21A8" /><Cell fill="#10B981" /><Cell fill="#C084FC" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="space-y-3 mt-4 text-[11px] font-black uppercase">
                                <div className="flex justify-between text-purple-700"><span>Monse</span><span>{formatCurrency(current.monse)}</span></div>
                                <div className="flex justify-between text-emerald-600"><span>Jess</span><span>{formatCurrency(current.jess)}</span></div>
                                <div className="flex justify-between text-purple-400"><span>Marla</span><span>{formatCurrency(current.marla)}</span></div>
                            </div>
                        </div>
                    </div>

                    {/* SECCIÓN DE PISOS (REPLICADA DEL TXT) */}
                    <MilestoneProgress name="Equipo Total" current={current.acumulado} target={current.meta} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
