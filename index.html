<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MoradaUno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F8F6F9; }
        .card-morada { background: white; border-radius: 2rem; box-shadow: 0 4px 20px rgba(103, 30, 117, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [selectedMonth, setSelectedMonth] = React.useState("");

            React.useEffect(() => {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";
                
                Papa.parse(url, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const clean = results.data.filter(r => r.QMesEquipo).map(row => {
                            const n = (v) => parseFloat(v?.replace(/[^0-9.-]+/g, "") || 0);
                            return {
                                name: row.QMesEquipo,
                                total: n(row.CantadoEquipo),
                                meta: n(row["Meta RevenueEquipo"]),
                                monse: n(row["Monse cantado"]),
                                jess: n(row["Jess cantado"]),
                                marla: n(row["Marla cantado"]),
                                alcance: n(row["Alcance Equipo (Meta)"])
                            };
                        });
                        setData(clean);
                        if(clean.length > 0) setSelectedMonth(clean[clean.length-1].name);
                        setLoading(false);
                    }
                });
            }, []);

            const current = React.useMemo(() => data.find(d => d.name === selectedMonth) || {}, [data, selectedMonth]);

            if (loading) return <div className="h-screen flex items-center justify-center text-[#671E75] font-black">CARGANDO DASHBOARD...</div>;

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm">
                        <h1 className="text-2xl font-black text-[#671E75]">MoradaUno <span className="text-slate-400 font-light">| Comercial</span></h1>
                        <select 
                            value={selectedMonth} 
                            onChange={(e) => setSelectedMonth(e.target.value)}
                            className="bg-slate-50 border-none font-bold px-4 py-2 rounded-xl text-[#671E75]"
                        >
                            {data.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
                        </select>
                    </div>

                    {/* KPI Principal */}
                    <div className={`p-10 rounded-[2.5rem] mb-8 border-2 ${current.alcance >= 100 ? 'bg-[#00C7B1] text-white border-[#00C7B1]' : 'bg-white border-purple-50'}`}>
                        <p className="text-[10px] font-black uppercase tracking-widest opacity-80 mb-2">Acumulado Total</p>
                        <div className="flex justify-between items-end">
                            <h2 className="text-6xl font-[900] tracking-tighter">${current.total?.toLocaleString()}</h2>
                            <div className="text-right">
                                <p className="text-xs font-bold uppercase opacity-80">Alcance</p>
                                <p className="text-4xl font-black">{current.alcance}%</p>
                            </div>
                        </div>
                    </div>

                    {/* Gráficas */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 card-morada p-8">
                            <h3 className="font-black text-[#671E75] text-xs uppercase mb-8 tracking-widest">Performance Mensual</h3>
                            <div className="h-80">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={data}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 900}} />
                                        <YAxis hide />
                                        <Tooltip cursor={{fill: '#F8FAFC'}} />
                                        <Bar dataKey="total" radius={[10, 10, 0, 0]}>
                                            {data.map((entry, index) => (
                                                <Cell key={index} fill={entry.name === selectedMonth ? '#671E75' : '#E2E8F0'} />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Mix de Asesoras */}
                        <div className="card-morada p-8">
                            <h3 className="font-black text-[#671E75] text-xs uppercase mb-6 tracking-widest">Mix Ventas</h3>
                            <div className="h-60">
                                <ResponsiveContainer>
                                    <PieChart>
                                        <Pie data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} innerRadius={50} outerRadius={75} paddingAngle={8} dataKey="value">
                                            <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#B14EB5" />
                                        </Pie>
                                        <Tooltip />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="mt-4 space-y-2">
                                <div className="flex justify-between text-[11px] font-black uppercase text-[#671E75]"><span>Monse</span><span>${current.monse?.toLocaleString()}</span></div>
                                <div className="flex justify-between text-[11px] font-black uppercase text-[#00C7B1]"><span>Jess</span><span>${current.jess?.toLocaleString()}</span></div>
                                <div className="flex justify-between text-[11px] font-black uppercase text-purple-400"><span>Marla</span><span>${current.marla?.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </div>

                    {/* Pisos (Lógica original) */}
                    <div className="mt-8 card-morada p-8">
                        <h3 className="font-black text-[#671E75] text-xs uppercase mb-10 tracking-widest">Pisos de Venta</h3>
                        <div className="relative pt-2 pb-12">
                            <div className="h-3 bg-slate-100 rounded-full w-full absolute"></div>
                            <div className="h-3 bg-[#671E75] rounded-full absolute transition-all" style={{ width: `${Math.min(100, (current.total / (current.meta * 1.51)) * 100)}%` }}></div>
                            
                            <div className="relative flex justify-between mt-8">
                                {[60, 101, 121, 151].map(p => (
                                    <div key={p} className="flex flex-col items-center">
                                        <div className={`w-4 h-4 rounded-full border-4 border-white shadow-sm ${current.total >= (current.meta * p/100) ? 'bg-[#671E75]' : 'bg-slate-200'}`}></div>
                                        <span className="text-[10px] font-black mt-2 text-slate-400">{p}%</span>
                                        <span className="text-[9px] font-bold text-slate-300">${(current.meta * p/100).toLocaleString()}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
