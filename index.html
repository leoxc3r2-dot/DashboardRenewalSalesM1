<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ventas MoradaUno</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Figtree', sans-serif; background-color: #F8F6F9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCNAHlj6yq9oKNQOJb9F-m1gyEJPIpESd-tWBhBP4o6BzAuqFKyt9Va6Ll7BrzoB7sYaTxeK2dAMaq/pub?gid=1811147079&single=true&output=csv";

        const Dashboard = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                Papa.parse(GOOGLE_SHEET_URL, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const clean = results.data
                            .filter(r => r.QMesEquipo)
                            .map(row => ({
                                mes: row.QMesEquipo,
                                monse: parseFloat(row["Monse cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                                jess: parseFloat(row["Jess cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                                marla: parseFloat(row["Marla cantado"]?.replace(/[^0-9.-]+/g, "") || 0),
                            }));
                        setData(clean);
                        setLoading(false);
                    }
                });
            }, []);

            if (loading) return <div className="p-20 text-center font-bold text-purple-800">Cargando datos...</div>;

            const actual = data[data.length - 1] || {};

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="mb-8">
                        <h1 className="text-3xl font-black text-[#671E75]">Ventas <span className="text-[#00C7B1]">MoradaUno</span></h1>
                        <p className="text-gray-500 font-bold">Seguimiento Real-Time 2026</p>
                    </header>

                    {/* Tarjetas de Resumen */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        {[
                            { n: 'Monse', v: actual.monse },
                            { n: 'Jess', v: actual.jess },
                            { n: 'Marla', v: actual.marla }
                        ].map(user => (
                            <div key={user.n} className="bg-white p-6 rounded-3xl shadow-sm border border-purple-50">
                                <p className="text-xs font-black text-gray-400 uppercase tracking-widest">{user.n}</p>
                                <h3 className="text-2xl font-black text-[#671E75]">${user.v.toLocaleString()}</h3>
                                <div className="w-full bg-gray-100 h-2 mt-4 rounded-full overflow-hidden">
                                    <div className="bg-[#00C7B1] h-full" style={{width: '75%'}}></div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Gráfica */}
                    <div className="bg-white p-6 rounded-[30px] shadow-sm border border-purple-50 h-[450px]">
                        <h2 className="text-xl font-black text-[#671E75] mb-6">Comparativo Mensual</h2>
                        <ResponsiveContainer width="100%" height="90%">
                            <BarChart data={data}>
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F0E6F0" />
                                <XAxis dataKey="mes" axisLine={false} tickLine={false} tick={{fill: '#671E75', fontWeight: 'bold'}} />
                                <YAxis hide />
                                <Tooltip cursor={{fill: '#F8F6F9'}} />
                                <Bar dataKey="monse" fill="#671E75" radius={[6, 6, 0, 0]} />
                                <Bar dataKey="jess" fill="#00C7B1" radius={[6, 6, 0, 0]} />
                                <Bar dataKey="marla" fill="#B14EB5" radius={[6, 6, 0, 0]} />
                            </BarChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
