<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoradaUno | Dashboard Renewal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8F6F9; font-family: 'Figtree', sans-serif; }
        .card-premium { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(103, 30, 117, 0.05); }
        .bg-morada { background-color: #671E75; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell, PieChart, Pie } = window.Recharts;

        const App = () => {
            const [data, setData] = useState([]);
            const [activeMonth, setActiveMonth] = useState("");
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // LEEMOS EL ARCHIVO QUE SUBISTE A GITHUB
                Papa.parse("datos.csv", {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const formatted = results.data
                            .filter(row => row.QMesEquipo || row["QMesEquipo"])
                            .map(row => {
                                const n = (v) => v ? parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0 : 0;
                                return {
                                    mes: row.QMesEquipo || row["QMesEquipo"],
                                    cantado: n(row.CantadoEquipo || row["CantadoEquipo"]),
                                    meta: n(row["Meta RevenueEquipo"] || row.MetaRevenueEquipo),
                                    alcance: n(row["Alcance mesEquipo"] || row.AlcanceMesEquipo),
                                    monse: n(row["cantadoMonse"] || row.cantadoMonse || row["Monse cantado"]),
                                    jess: n(row["cantadoJess"] || row.cantadoJess || row["Jess cantado"]),
                                    marla: n(row["cantadoMarla"] || row.cantadoMarla || row["Marla cantado"])
                                };
                            });
                        setData(formatted);
                        if(formatted.length > 0) setActiveMonth(formatted[formatted.length - 1].mes);
                        setLoading(false);
                    },
                    error: () => {
                        alert("No se encontró el archivo datos.csv en tu repositorio.");
                    }
                });
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center font-black text-[#671E75] animate-pulse">
                    CARGANDO ARCHIVO LOCAL...
                </div>
            );

            const current = data.find(d => d.mes === activeMonth) || data[0];

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-10">
                    <header className="flex justify-between items-center mb-10 bg-white p-6 rounded-[2rem] shadow-sm">
                        <h1 className="text-2xl font-[900] text-[#671E75] italic">MORADAUNO</h1>
                        <select 
                            value={activeMonth} 
                            onChange={(e) => setActiveMonth(e.target.value)}
                            className="bg-purple-50 border-none font-bold px-6 py-3 rounded-2xl text-[#671E75]"
                        >
                            {data.map(d => <option key={d.mes} value={d.mes}>{d.mes}</option>)}
                        </select>
                    </header>

                    <div className={`p-12 rounded-[3rem] mb-10 text-white transition-all duration-500 shadow-xl ${current.alcance >= 100 ? 'bg-teal-500' : 'bg-[#671E75]'}`}>
                        <p className="text-xs font-black uppercase tracking-widest opacity-70 mb-2">Total Cantado Equipo</p>
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <h2 className="text-7xl font-black tracking-tighter">${current.cantado?.toLocaleString()}</h2>
                            <div className="bg-black/10 px-10 py-6 rounded-[2.5rem] text-center min-w-[200px]">
                                <p className="text-xs font-bold opacity-70 uppercase mb-1">Alcance</p>
                                <p className="text-6xl font-black">{current.alcance}%</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="card-premium p-8 h-80">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6">Historial</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={data}>
                                    <XAxis dataKey="mes" hide />
                                    <Tooltip />
                                    <Bar dataKey="cantado" radius={[10, 10, 0, 0]}>
                                        {data.map((entry, index) => (
                                            <Cell key={index} fill={entry.mes === activeMonth ? '#671E75' : '#E2E8F0'} />
                                        ))}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>

                        <div className="card-premium p-8 h-80">
                            <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6">Mix Asesoras</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <PieChart>
                                    <Pie 
                                        data={[
                                            { name: 'Monse', value: current.monse },
                                            { name: 'Jess', value: current.jess },
                                            { name: 'Marla', value: current.marla }
                                        ]} 
                                        dataKey="value" innerRadius={60} outerRadius={80} paddingAngle={8}
                                    >
                                        <Cell fill="#671E75" /><Cell fill="#00C7B1" /><Cell fill="#C084FC" />
                                    </Pie>
                                    <Tooltip />
                                </PieChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
